apiVersion: apps/v1
kind: Deployment
metadata:
  name: azdemo-api
  labels:
    app: azdemo-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: azdemo-api
  template:
    metadata:
      labels:
        app: azdemo-api
    spec:
      containers:
      - name: api
        image: REGISTRY_URL/azdemo-api:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: PG_HOST
          value: "PG_HOST_VALUE"
        - name: PG_USER
          value: "pgadmin"
        - name: PG_PASS
          valueFrom:
            secretKeyRef:
              name: pg-credentials
              key: password
        - name: PG_DB
          value: "postgres"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: azdemo-api
spec:
  type: LoadBalancer
  selector:
    app: azdemo-api
  ports:
  - port: 80
    targetPort: 8080
